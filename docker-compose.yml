
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: webhawk
      POSTGRES_USER: webhawk
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U webhawk"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  security-engine:
    build: ./security-engine
    ports:
      - "8081:8081"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: webhawk
      DB_USER: webhawk
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  middleware:
    build: ./middleware
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: webhawk
      DB_USER: webhawk
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      SECURITY_ENGINE_URL: http://security-engine:8081
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      security-engine:
        condition: service_started

  vulnerable-backend:
    build: ./vulnerable-backend
    ports:
      - "9090:9090"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: webhawk
      DB_USER: webhawk
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pg_data:
