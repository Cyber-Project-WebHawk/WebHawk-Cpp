
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: webhawk
      POSTGRES_USER: webhawk
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U webhawk"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  security-engine:
    build: ./security-engine
    ports:
      - "8081:8081"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: webhawk
      DB_USER: webhawk
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/localhost/8081' 2>/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 60s

  middleware:
    build: ./middleware
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: webhawk
      DB_USER: webhawk
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      SECURITY_ENGINE_URL: http://security-engine:8081
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      security-engine:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/localhost/8080' 2>/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 60s

  vulnerable-backend:
    build: ./vulnerable-backend
    ports:
      - "9090:9090"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: webhawk
      DB_USER: webhawk
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'cat < /dev/null > /dev/tcp/localhost/9090' 2>/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 60s

  tester:
    image: alpine:3.19
    profiles: ["test"]
    environment:
      WEBHAWK_BASE: http://middleware:8080
    volumes:
      - ./test_e2e.sh:/test_e2e.sh:ro
    entrypoint: ["sh", "-c", "apk add --no-cache bash curl jq > /dev/null 2>&1 && sed 's/\\r//' /test_e2e.sh > /tmp/test.sh && bash /tmp/test.sh"]
    depends_on:
      middleware:
        condition: service_healthy
      security-engine:
        condition: service_healthy
      vulnerable-backend:
        condition: service_healthy

volumes:
  pg_data:
